        .pagination-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 25px; margin-bottom: 40px; }
        .page-btn { padding: 8px 15px; border: 1px solid #5a2e2e; background: white; color: #5a2e2e; cursor: pointer; font-family: "標楷體"; border-radius: 4px; }
        .page-btn.active { background: #5a2e2e; color: white; }

            .book-img-container img { max-width: 100% !important; }
        }
    </style>
</head>

    // --- 功能初始化 ---
    const cardList = document.getElementById('cardList'), searchInput = document.getElementById('searchInput'),
          searchBtn = document.getElementById('searchBtn'), idcToolbar = document.getElementById('idcToolbar'),
          charsTable = document.getElementById('charsTable'), pagination = document.getElementById('pagination'),
          overlay = document.getElementById('zoomOverlay'), viewer = document.getElementById('zoomViewer'), 
          vImg = document.getElementById('viewerImg'), vBtn = document.getElementById('zoomClose');
    
    let scale = 1, posX = 0, posY = 0, startX = 0, startY = 0, isDragging = false;
    let currentPage = 1;
    const itemsPerPage = 100;

    function renderCards(data) {
        cardList.innerHTML = '';
        if (data.length === 0) { cardList.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">本網站主收錄教育部《異體字字典》中未收錄之字。</div>'; return; }
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'character-card';
            card.innerHTML = `
                <div class="char-visual"><div class="main-char ${item.mainFont || ''}">${item.char}</div><div class="char-structure-box"><div class="char-structure">字形結構：${item.structure}</div></div></div>
                <div class="char-info">
                    <table class="info-table">
                        <tr><th>注音</th><td>${item.reading}</td></tr>
                        <tr><th>漢語拼音</th><td>${item.pinyin || ''}</td></tr>
                        <tr><th>釋義</th><td>${item.definition}</td></tr>
                        ${ (item.bookSource || item.bookImg) ? `<tr><th>參考文獻</th><td><span class="book-source-text">${item.bookSource || ''}</span><div class="book-img-container">${item.bookImg || ''}</div></td></tr>` : '' }
                    </table>
                </div>
            `;
            cardList.appendChild(card);
        });
        document.querySelectorAll('.zoomable').forEach(img => {
            img.onclick = () => openViewer(img.src);
        });
    }

    function openViewer(src) {
        vImg.src = src; scale = 1; posX = 0; posY = 0; updateTransform();
        overlay.style.display = 'block'; viewer.style.display = 'block'; vBtn.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
        overlay.style.display = 'none'; viewer.style.display = 'none'; vBtn.style.display = 'none';
        document.body.style.overflow = '';
    }

    vBtn.onclick = overlay.onclick = closeViewer;

    viewer.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.15 : 0.15;
        scale = Math.min(Math.max(0.5, scale + delta), 8);
        updateTransform();
    };

    viewer.onmousedown = (e) => {
        isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY;
    };

    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX; posY = e.clientY - startY;
        updateTransform();
    };

    window.onmouseup = () => isDragging = false;

    function updateTransform() {
        vImg.style.transform = `translate(-50%, -50%) translate(${posX}px, ${posY}px) scale(${scale})`;
    }

                   (charText.includes("𪱹") || (c.structure === "⿰木水" && (val === "𪱹" || val === "木水" || val === "待考"))) ||
                   (charText.includes("𲍄") || (c.structure === "⿰魚嶷" && (val === "𲍄" || val === "魚嶷" || val === "魚罒疑"))) ||
                   (c.structure === "⿱⿰東殳玉" && (val === "東殳玉" || val.includes("東") || val.includes("殳") || val.includes("玉"))) ||
                   (charText.includes("筽") || (c.structure === "⿱𥫗吳" && (val === "筽" || val === "ㄨˊ" || val.includes("吳")))) ||
                   (c.structure === "⿰火處" && (val === "火處" || val.includes("火") || val.includes("處"))) ||
                   (c.structure === "⿰爿床" && (val === "爿床" || val === "ㄔㄨㄤˊ" || val === "chuáng" || val.includes("爿") || val.includes("床"))) ||
                   (c.structure === "⿱⿰⿱欠卉殳皿" && (val === "待考" || val.includes("欠") || val.includes("皿")));
        });
        toggleView('search'); renderCards(res); window.scrollTo(0, 0);
    }

    function toggleView(view) {
        const sv = document.getElementById('searchView'), av = document.getElementById('allCharsView');
        if (view === 'all') { sv.style.display = 'none'; av.style.display = 'block'; currentPage = 1; renderGrid(); }
        else { sv.style.display = 'block'; av.style.display = 'none'; }
    }

    /* 修改：支援 100 字分頁的文字總表渲染 */
    function renderGrid() {
        charsTable.innerHTML = ''; 
        pagination.innerHTML = '';
        charsTable.style.display = 'table';
        
        const totalItems = characters.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        
        // 取得當前分頁的數據
        const start = (currentPage - 1) * itemsPerPage;
        const end = Math.min(start + itemsPerPage, totalItems);
        const pageData = characters.slice(start, end);

        const cols = window.innerWidth < 600 ? 5 : 10;
        let row;
        
        pageData.forEach((item, index) => {
            if (index % cols === 0) row = charsTable.insertRow();
            const cell = row.insertCell();
            cell.innerHTML = item.char;
            cell.className = item.mainFont || "";
            cell.onclick = () => { renderCards([item]); toggleView('search'); window.scrollTo(0,0); };
        });

        // 渲染分頁按鈕
        if (totalPages > 1) {
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => {
                    currentPage = i;
                    renderGrid();
                    window.scrollTo(0, 0);
                };
                pagination.appendChild(btn);
            }
        }
    }

    searchBtn.addEventListener('click', performSearch);
    searchInput.onkeydown = (e) => { if (e.key === "Enter") performSearch(); };
    document.getElementById('homeBtn').onclick = () => { searchInput.value = ''; renderCards([]); toggleView('search'); window.scrollTo(0,0); };
    document.getElementById('showAllBtn').onclick = () => toggleView('all');

    const idcs = "⿰⿱⿲⿳⿴⿵⿶⿷⿸⿹⿺⿻";
    idcs.split('').forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'idc-btn'; btn.innerText = c;
        btn.onclick = () => { searchInput.value += c; searchInput.focus(); };
        idcToolbar.appendChild(btn);
    });
</script>
