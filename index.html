<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>僻字考究網 - 專業校對終版</title>

    <style>
        /* 1. 字體導入 */
        @font-face {
            font-family: 'WenJinMincho';
            src: local('文津宋體W 第3平面'), local('WenJinMinchoW-TTF'), url('WenJinMinchoW-TTF.ttc') format('collection');
            font-display: swap;
        }
        @font-face { font-family: 'NomNaTong'; src: local('NomNaTong-Regular'), url('NomNaTong-Regular.otf'); font-display: swap; }
        @font-face { font-family: 'TWKai'; src: local('全字庫正楷體'), url('全字庫正楷體Unicode2.ttf'); font-display: swap; }
        @font-face { font-family: 'TWKaiExtB'; src: local('TW-Kai-Ext-B'), url('TW-Kai-Ext-B-98_1.ttf'); font-display: swap; }
        @font-face { font-family: 'TWKai98'; src: local('TW-Kai-98_1'), url('TW-Kai-98_1.ttf'); font-display: swap; }
        @font-face { 
            font-family: 'SimSunExtB'; 
            src: local('SimSun-ExtB'), local('新細明體-ExtB'), url('SimSun-ExtB.ttf') format('truetype'); 
            font-display: swap; 
        }
        @font-face { font-family: 'TWKaiPlus98'; src: local('TW-Kai-Plus-98_1'), url('TW-Kai-Plus-98_1.ttf'); font-display: swap; }
        @font-face {
            font-family: 'NanumMyeongjo';
            src: local('NanumMyeongjo'), url('NanumMyeongjo.ttf') format('truetype');
            font-display: swap;
        }

        /* 2. 基礎規範 */
        * { box-sizing: border-box; font-weight: normal !important; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #f4f1ea; color: #333; margin: 0; padding: 0;
            font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
            overflow-x: hidden; -webkit-text-size-adjust: 100%;
        }

        .nav-bar { background-color: #5a2e2e; padding: 10px 20px; display: flex; justify-content: flex-end; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: #f4f1ea; text-decoration: none; margin-left: 20px; font-size: 1.1em; cursor: pointer; background: none; border: none; font-family: "標楷體"; padding: 5px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: #5a2e2e; font-size: 2.2em; border-bottom: 3px double #5a2e2e; display: inline-block; padding-bottom: 10px; font-family: "標楷體"; }

        /* 搜尋區 */
        .search-wrapper { display: flex; justify-content: center; max-width: 700px; margin: 0 auto 15px auto; }
        #searchInput { flex: 1; padding: 12px 15px; font-size: 18px; border: 2px solid #5a2e2e; border-right: none; border-radius: 25px 0 0 25px; outline: none; font-family: "標楷體"; }
        #searchBtn { padding: 0 25px; font-size: 18px; background-color: #5a2e2e; color: white; border: 2px solid #5a2e2e; border-radius: 0 25px 25px 0; cursor: pointer; font-family: "標楷體"; }
        
        .idc-toolbar { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-top: 15px; }
        .idc-btn { background: #fff; border: 1px solid #5a2e2e; color: #5a2e2e; padding: 10px 18px; font-size: 24px; cursor: pointer; border-radius: 4px; touch-action: manipulation; }

        .all-chars-grid { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; display: none; table-layout: fixed; }
        .all-chars-grid td { border: 1px solid #5a2e2e; height: 70px; text-align: center; font-size: 2.2em; cursor: pointer; }

        /* 考究卡片 */
        .character-card { background: #fff; padding: 25px; border: 2px solid #5a2e2e; margin-top: 20px; margin-bottom: 30px; width: 100%; overflow: hidden; }
        .char-visual { text-align: center; width: 100%; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 25px; }
        .main-char { font-size: 100px !important; line-height: 1.1; margin: 0; color: #000; }
        
        .char-structure-box { text-align: center; margin-top: 10px; }
        .char-structure { background: #f0ebe0; padding: 5px 12px; border-radius: 4px; font-size: 17px; display: inline-block; font-family: "標楷體", serif !important; }

        .info-table { width: 100% !important; border-collapse: collapse; table-layout: fixed; }
        .info-table th { background-color: #f9f7f2; color: #8b0000; width: 110px; font-size: 1.1em; text-align: center; border: 1px solid #5a2e2e; padding: 12px 8px; font-family: "標楷體", serif !important; }
        .info-table td { text-align: left; font-size: 1.05em; line-height: 1.7; border: 1px solid #5a2e2e; padding: 12px 15px; word-wrap: break-word; font-family: "標楷體", serif !important; }

        .book-source-text { font-family: "標楷體", serif !important; display: block; margin-bottom: 5px; }
        .book-img-container { display: block; width: 100%; margin-top: 10px; }
        .book-img-container img { border: 1px solid #ccc; display: block; margin-bottom: 10px; cursor: zoom-in; }

        /* 釋義小圖 */
        .def-inline-flickr { display: inline-block; vertical-align: middle; line-height: 0; }
        .def-inline-flickr img { height: 1.1em !important; width: auto !important; border: none !important; vertical-align: middle; }

        /* 放大鏡邏輯 */
        .zoomable { touch-action: none; max-width: 100%; height: auto; }
        .zoomed { position: fixed !important; z-index: 9999; cursor: grab; max-width: none !important; height: auto !important; width: 100vw !important; border: 2px solid #5a2e2e !important; background: white; top: 50%; left: 50%; transform: translate(-50%, -50%) !important; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9998; }

        /* 字體類別控制 */
        .wen-jin-text { font-family: 'WenJinMincho', serif !important; }
        .nom-text { font-family: 'NomNaTong', serif !important; }
        .tw-ext-b { font-family: 'TWKaiExtB', serif !important; }
        .tw-kai-98 { font-family: 'TWKai98', serif !important; } 
        .simsun-extb { font-family: 'SimSunExtB', serif !important; }
        .tw-plus-98 { font-family: 'TWKaiPlus98', serif !important; }
        .nanum-text { font-family: 'NanumMyeongjo', serif !important; }
        .vn-roman { font-family: "Times New Roman", serif !important; }

        @media screen and (max-width: 600px) {
            .main-char { font-size: 80px !important; }
            .info-table th { width: 90px; font-size: 1em; }
            .idc-btn { padding: 12px 15px; font-size: 26px; }
            .book-img-container img { max-width: 100% !important; } /* 手機上恢復滿版，因為寬度本來就窄 */
        }
    </style>
</head>

<div id="zoomOverlay" class="zoom-overlay"></div>
<nav class="nav-bar">

</nav>

        <table class="all-chars-grid" id="charsTable"></table>
    </div>
</div>

            /* 優化：預覽寬度 350px */
            bookImg: `<img src="https://library.ctext.org/s2350875/s2350875_0169.png" class="zoomable" referrerpolicy="no-referrer" style="max-width:350px">`, 
            bookSource: "《道要靈祇神鬼品經》" 
        },
        { 
            char: "蒏", structure: "⿳艹冖酉", mainFont: "", 
            pinyin: `<span class="vn-roman">yǒng</span>`, reading: `ㄩㄥˇ`, 
            definition: `酗酒至亂。《尚書正義五》：「沉湎酗蒏。……蒏，音詠。」`, 
            /* 優化：預覽寬度 300px */
            bookImg: `<img src="https://library.ctext.org/s0140011/s0140011_0080.png" class="zoomable" referrerpolicy="no-referrer" style="max-width:300px"><img src="https://library.ctext.org/s0140011/s0140011_0081.png" class="zoomable" referrerpolicy="no-referrer" style="max-width:300px">`, 
            bookSource: "《尚書正義五》" 
        },
        { 
            char: "𡺈", structure: "⿰山音", mainFont: "tw-ext-b", 
            pinyin: `<span class="vn-roman">pòu</span>`, reading: `ㄆㄡˋ`, 
            definition: `「<span class="tw-ext-b">𡺈</span>嶁」：小山也。《新撰字鏡》：「<span class="tw-ext-b">𡺈</span>，薄口反，上。<span class="tw-ext-b">𡺈</span>嶁。」<br>《王仁昫刋謬補缺切韻一‧卷第三》：「<span class="tw-kai-98">㟝</span>嶁，小垛。（<span class="tw-kai-98">蒱</span>口反）」。`, 
            bookSource: "《新撰字鏡》。<br>國立北平故宮博物院出版《唐寫本王仁昫刋謬補缺切韻》（民36年12月10日初版）。"

            pinyin: `<span class="vn-roman">lǒng</span>`, reading: `ㄌㄨㄥˇ`, 
            definition: `鬼名。丙戌日鬼。《道要靈祇神鬼品經》：「丙戌日鬼，名<span class="tw-ext-b">𪚣</span>狼董切。」`, 
            /* 優化：預覽寬度 350px */
            bookImg: `<img src="https://library.ctext.org/s2350875/s2350875_0150.png" class="zoomable" referrerpolicy="no-referrer" style="max-width:350px">`, 
            bookSource: "《道要靈祇神鬼品經》" 
        }
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const cardList = document.getElementById('cardList');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const idcToolbar = document.getElementById('idcToolbar');
        const charsTable = document.getElementById('charsTable');
        const homeBtn = document.getElementById('homeBtn');
        const showAllBtn = document.getElementById('showAllBtn');
        const overlay = document.getElementById('zoomOverlay');

        // 初始化 IDC
        "⿰⿱⿲⿳⿴⿵⿶⿷⿸⿹⿺⿻".split('').forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'idc-btn'; btn.innerText = c;
            btn.onclick = () => { searchInput.value += c; searchInput.focus(); };
            idcToolbar.appendChild(btn);
        });

        function renderCards(data) {
            cardList.innerHTML = '';
            if (data.length === 0) {
                cardList.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">查無結果。</div>';
                return;
            }
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <div class="char-visual"><div class="main-char ${item.mainFont || ''}">${item.char}</div><div class="char-structure-box"><div class="char-structure">字形結構：${item.structure}</div></div></div>
                    <div class="char-info">
                        <table class="info-table">
                            <tr><th>注音</th><td>${item.reading}</td></tr>
                            <tr><th>漢語拼音</th><td>${item.pinyin}</td></tr>
                            <tr><th>釋義</th><td>${item.definition}</td></tr>
                            ${ (item.bookSource || item.bookImg) ? `<tr><th>參考文獻</th><td><span class="book-source-text">${item.bookSource || ''}</span><div class="book-img-container">${item.bookImg || ''}</div></td></tr>` : '' }
                        </table>
                    </div>
                `;
                cardList.appendChild(card);
            });
            setupZoomable();
        }

        function performSearch() {
            const val = searchInput.value.trim();
            if (!val) { renderCards([]); return; }
            const filtered = characters.filter(c => c.char.includes(val) || c.reading.includes(val) || c.structure.includes(val));
            toggleView('search'); renderCards(filtered);
        }

        function toggleView(view) {
            if (view === 'all') {
                document.getElementById('searchView').style.display = 'none';
                document.getElementById('allCharsView').style.display = 'block';
                renderGrid();
            } else {
                document.getElementById('searchView').style.display = 'block';
                document.getElementById('allCharsView').style.display = 'none';
            }
        }

        function renderGrid() {
            charsTable.innerHTML = ''; charsTable.style.display = 'table';
            const cols = window.innerWidth < 600 ? 5 : 10;
            let row;
            characters.forEach((item, index) => {
                if (index % cols === 0) row = charsTable.insertRow();
                const cell = row.insertCell(); cell.innerText = item.char;
                cell.className = item.mainFont || "";
                cell.onclick = () => { toggleView('search'); renderCards([item]); window.scrollTo(0,0); };
            });
        }

        function setupZoomable() {
            document.querySelectorAll('.zoomable').forEach(img => {
                img.onclick = function() {
                    if (this.classList.contains('zoomed')) {
                        this.classList.remove('zoomed'); overlay.style.display = 'none';
                    } else {
                        document.querySelectorAll('.zoomed').forEach(el => el.classList.remove('zoomed'));
                        this.classList.add('zoomed'); overlay.style.display = 'block';
                    }
                };
            });
        }

        overlay.onclick = () => {
            document.querySelectorAll('.zoomed').forEach(el => el.classList.remove('zoomed'));
            overlay.style.display = 'none';
        };

        searchBtn.onclick = performSearch;
        searchInput.onkeydown = (e) => { if (e.key === "Enter") performSearch(); };
        homeBtn.onclick = () => { searchInput.value = ''; renderCards([]); toggleView('search'); window.scrollTo(0,0); };
        showAllBtn.onclick = () => toggleView('all');
    });
</script>
