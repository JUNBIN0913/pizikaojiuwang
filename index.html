<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>僻字考究網 - 專業校對終版</title>

    <style>
        /* 1. 字體導入：強化 TTC 與 TTF 的名稱匹配，確保手機相容 */
        @font-face {
            font-family: 'WenJinMincho';
            src: local('文津宋體W 第3平面'), local('WenJinMinchoW-TTF'), url('WenJinMinchoW-TTF.ttc') format('collection');
            font-display: swap;
        }
        @font-face { font-family: 'NomNaTong'; src: local('NomNaTong-Regular'), url('NomNaTong-Regular.otf'); font-display: swap; }
        @font-face { font-family: 'TWKaiExtB'; src: local('TW-Kai-Ext-B'), url('TW-Kai-Ext-B-98_1.ttf'); font-display: swap; }
        @font-face { font-family: 'TWKai98'; src: local('TW-Kai-98_1'), url('TW-Kai-98_1.ttf'); font-display: swap; }
        @font-face { 
            font-family: 'SimSunExtB'; 
            src: local('SimSun-ExtB'), local('新細明體-ExtB'), url('SimSun-ExtB.ttf') format('truetype'); 
            font-display: swap; 
        }
        @font-face { font-family: 'TWKaiPlus98'; src: local('TW-Kai-Plus-98_1'), url('TW-Kai-Plus-98_1.ttf'); font-display: swap; }
        @font-face {
            font-family: 'NanumMyeongjo';
            src: local('NanumMyeongjo'), url('NanumMyeongjo.ttf') format('truetype');
            font-display: swap;
        }

        /* 2. 基礎規範：全站標楷體、無粗體 */
        * { box-sizing: border-box; font-weight: normal !important; }

        body {
            background-color: #f4f1ea; color: #333; margin: 0; padding: 0;
            font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
            overflow-x: hidden; -webkit-text-size-adjust: 100%;
        }

        .nav-bar { background-color: #5a2e2e; padding: 10px 40px; display: flex; justify-content: flex-end; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: #f4f1ea; text-decoration: none; margin-left: 30px; font-size: 1.2em; cursor: pointer; background: none; border: none; font-family: "標楷體"; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #5a2e2e; font-size: 2.5em; border-bottom: 3px double #5a2e2e; display: inline-block; padding-bottom: 10px; }

        /* 搜尋區 */
        .search-wrapper { display: flex; justify-content: center; max-width: 700px; margin: 0 auto 15px auto; }
        #searchInput { flex: 1; padding: 12px 20px; font-size: 18px; border: 2px solid #5a2e2e; border-right: none; border-radius: 25px 0 0 25px; outline: none; font-family: "標楷體"; }
        #searchBtn { padding: 0 30px; font-size: 18px; background-color: #5a2e2e; color: white; border: 2px solid #5a2e2e; border-radius: 0 25px 25px 0; cursor: pointer; font-family: "標楷體"; }
        .idc-toolbar { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .idc-btn { background: #fff; border: 1px solid #5a2e2e; color: #5a2e2e; padding: 8px 15px; font-size: 22px; cursor: pointer; border-radius: 4px; }

        .all-chars-grid { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; display: none; table-layout: fixed; }
        .all-chars-grid td { border: 1px solid #5a2e2e; width: 10%; height: 80px; text-align: center; font-size: 2.5em; cursor: pointer; }

        /* 考究卡片 */
        .character-card { background: #fff; padding: 40px; border: 2px solid #5a2e2e; margin-top: 20px; margin-bottom: 30px; width: 100%; max-width: 100%; overflow: hidden; }
        .char-visual { text-align: center; width: 100%; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .main-char { font-size: 100px !important; line-height: 1.1; margin: 0; color: #000; }
        
        .char-structure-box { text-align: center; margin-top: 15px; }
        .char-structure { background: #f0ebe0; padding: 5px 15px; border-radius: 4px; font-size: 18px; display: inline-block; word-break: break-all; font-family: "標楷體", serif !important; }

        .info-table { width: 100% !important; border-collapse: collapse; table-layout: fixed; }
        .info-table th { background-color: #f9f7f2; color: #8b0000; width: 130px; font-size: 1.2em; text-align: center; border: 1px solid #5a2e2e; padding: 15px 10px; font-family: "標楷體", serif !important; }
        .info-table td { text-align: left; font-size: 1.1em; line-height: 1.8; border: 1px solid #5a2e2e; padding: 15px 20px; word-wrap: break-word; word-break: break-word; font-family: "標楷體", serif !important; }

        .book-source-text { font-family: "標楷體", serif !important; display: block; margin-bottom: 5px; }
        .book-img-container { display: block; max-width: 500px; width: 100%; height: auto; margin-top: 10px; }
        .book-img-container img { max-width: 100%; height: auto; border: 1px solid #ccc; display: block; margin-bottom: 10px; }

        /* 圖片與文字等大優化 */
        .def-inline-flickr { display: inline-block; vertical-align: middle; line-height: 0; margin: 0 2px; }
        .def-inline-flickr img { height: 1.1em !important; width: auto !important; border: none !important; vertical-align: middle; }

        .zoomable { cursor: zoom-in; user-select: none; touch-action: none; }
        .zoomed { position: fixed !important; z-index: 9999; cursor: grab; max-width: none !important; height: 100vh !important; width: auto !important; border: 2px solid #5a2e2e !important; box-shadow: 0 0 50px rgba(0,0,0,0.7); background: white; top: 0; left: 0; transition: transform 0.1s ease-out; }
        .zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9998; }

        /* 字體類別控制 */
        .wen-jin-text { font-family: 'WenJinMincho', serif !important; }
        .nom-text { font-family: 'NomNaTong', serif !important; }
        .tw-ext-b { font-family: 'TWKaiExtB', serif !important; }
        .tw-kai-98 { font-family: 'TWKai98', serif !important; } 
        .simsun-extb { font-family: 'SimSunExtB', serif !important; }
        .tw-plus-98 { font-family: 'TWKaiPlus98', serif !important; }
        .nanum-text { font-family: 'NanumMyeongjo', serif !important; }
        .vn-roman { font-family: "Times New Roman", serif !important; }

        @media screen and (max-width: 600px) {
            .all-chars-grid td { width: 20%; height: 60px; font-size: 1.8em; }
            .character-card { padding: 25px 15px; }
            /* 手機版主字稍微縮小至 80px 避免跑版 */
            .main-char { font-size: 80px !important; }
            .info-table th { width: 95px; font-size: 1em; }
        }
    </style>
</head>

            definition: `1、人名。韓國女團<span class="vn-roman">T-ara</span>的成員之一：咸<span class="tw-ext-b">𤨒</span>晶（<span class="nanum-text">함은정</span>）。<br>2、鬼名，<span class="tw-ext-b">𤨒</span>內子。《道要靈祇神鬼品經》：「石精之鬼，名<span class="tw-ext-b">𤨒</span>（於巾切）內子。」`, 
            bookImg: `<img src="https://library.ctext.org/s2350875/s2350875_0169.png" class="zoomable">`, 
            bookSource: "《道要靈祇神鬼品經》" 
        },
        { 
            char: "蒏", structure: "⿳艹冖酉", mainFont: "", 
            pinyin: `<span class="vn-roman">yǒng</span>`, reading: `ㄩㄥˇ`, 
            definition: `酗酒至亂。《尚書正義五》：「沉湎酗蒏。……蒏，音詠。」`, 
            bookImg: `<img src="https://library.ctext.org/s0140011/s0140011_0080.png" class="zoomable"><img src="https://library.ctext.org/s0140011/s0140011_0081.png" class="zoomable">`, 
            bookSource: "《尚書正義五》" 
        },
        { 
            char: "𡺈", structure: "⿰山音", mainFont: "tw-ext-b", 
            pinyin: `<span class="vn-roman">pòu</span>`, reading: `ㄆㄡˋ`, 
            definition: `「<span class="tw-ext-b">𡺈</span>嶁」：小山也。《新撰字鏡》：「<span class="tw-ext-b">𡺈</span>，薄口反，上。<span class="tw-ext-b">𡺈</span>嶁。」<br>《王仁昫刋謬補缺切韻一‧卷第三》：「<span class="tw-kai-98">㟝</span>嶁，小垛。（<span class="tw-kai-98">蒱</span>口反）」。`, 
            bookSource: "《新撰字鏡》。<br>國立北平故宮博物院出版《唐寫本王仁昫刋謬補缺切韻》（民36年12月10日初版）。" 
        },
        { 
            char: "𪚣", structure: "⿱殸龍", mainFont: "tw-ext-b", 
            pinyin: `<span class="vn-roman">lǒng</span>`, reading: `ㄌㄨㄥˇ`, 
            definition: `鬼名。丙戌日鬼。《道要靈祇神鬼品經》：「丙戌日鬼，名<span class="tw-ext-b">𪚣</span>狼董切。」`, 
            bookImg: `<img src="https://library.ctext.org/s2350875/s2350875_0150.png" class="zoomable">`, 
            bookSource: "《道要靈祇神鬼品經》" 
        }
    ];

    const cardList = document.getElementById('cardList'), searchInput = document.getElementById('searchInput'), overlay = document.getElementById('zoomOverlay');
    let isDragging = false, startX, startY, currentX = 0, currentY = 0, moved = false, currentScale = 1;

    function goToHome() { toggleView('search'); searchInput.value = ''; cardList.innerHTML = ''; }

    function renderCards(data) {
        cardList.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'character-card';
            card.innerHTML = `
                <div class="char-visual"><div class="main-char ${item.mainFont}">${item.char}</div><div class="char-structure-box"><div class="char-structure">字形結構：${item.structure}</div></div></div>
                <div class="char-info">
                    <table class="info-table">
                        <tr><th>注音</th><td>${item.reading}</td></tr>
                        <tr><th>漢語拼音</th><td>${item.pinyin}</td></tr>
                        <tr><th>釋義</th><td>${item.definition}</td></tr>
                        ${ (item.bookSource || item.bookImg) ? `<tr><th>參考文獻</th><td><span class="book-source-text">${item.bookSource}</span><div class="book-img-container">${item.bookImg || ''}</div></td></tr>` : '' }
                    </table>
                </div>
            `;
            cardList.appendChild(card);
        });
        setupZoomable();
        if(window.Flickr && window.Flickr.embedr) { window.Flickr.embedr.init(); }
    }

    function updateImageTransform(img) { img.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`; }

    function setupZoomable() {
        document.querySelectorAll('.zoomable').forEach(img => {
            img.onmousedown = (e) => startDrag(e);
            img.ontouchstart = (e) => startDrag(e.touches[0]);
            img.onwheel = function(e) {
                if (!this.classList.contains('zoomed')) return;
                e.preventDefault();
                currentScale = Math.min(Math.max(0.5, currentScale + (e.deltaY > 0 ? -0.1 : 0.1)), 5);
                updateImageTransform(this);
            };
            img.onclick = function(e) {
                if (moved) return;
                if (!this.classList.contains('zoomed')) {
                    this.classList.add('zoomed'); overlay.style.display = 'block'; currentScale = 1;
                    setTimeout(() => { 
                        const rect = this.getBoundingClientRect();
                        currentX = (window.innerWidth - rect.width)/2; currentY = 0; updateImageTransform(this); 
                    }, 50);
                } else { resetZoom(this); }
            };
        });
    }

    function startDrag(e) {
        const img = document.querySelector('.zoomed'); if (!img) return;
        isDragging = true; moved = false; startX = e.clientX - currentX; startY = e.clientY - currentY;
    }
    window.onmousemove = (e) => handleMove(e);
    window.ontouchmove = (e) => handleMove(e.touches[0]);
    function handleMove(e) {
        if (!isDragging) return;
        moved = true; currentX = e.clientX - startX; currentY = e.clientY - startY;
        const img = document.querySelector('.zoomed'); if (img) updateImageTransform(img);
    }
    window.onmouseup = window.ontouchend = () => isDragging = false;
    function resetZoom(img) { img.classList.remove('zoomed'); img.style.transform = 'none'; overlay.style.display = 'none'; currentX = 0; currentY = 0; currentScale = 1; }
    overlay.onclick = () => { const img = document.querySelector('.zoomed'); if (img) resetZoom(img); };

    function toggleView(view) {
        const sv = document.getElementById('searchView'), av = document.getElementById('allCharsView');
        if (view === 'all') { sv.style.display = 'none'; av.style.display = 'block'; renderAllCharsGrid(); }
        else { sv.style.display = 'block'; av.style.display = 'none'; }
    }

    function renderAllCharsGrid() {
        const table = document.getElementById('charsTable'), cols = window.innerWidth < 600 ? 5 : 10;
        table.innerHTML = ''; table.style.display = 'table';
        let row;
        characters.forEach((item, index) => {
            if (index % cols === 0) row = table.insertRow();
            const cell = row.insertCell(); cell.innerText = item.char;
            cell.className = item.mainFont || ""; 
            cell.onclick = () => { toggleView('search'); renderCards([item]); window.scrollTo(0,0); };
        });
    }

    document.getElementById('searchBtn').onclick = performSearch;
    document.getElementById('searchInput').onkeydown = (e) => { if (e.key === "Enter") performSearch(); };

    function performSearch() {
        const val = searchInput.value.trim();
        renderCards(characters.filter(c => c.char.includes(val) || c.reading.includes(val) || c.structure.includes(val)));
    }

    const toolbar = document.getElementById('idcToolbar');
    "⿰⿱⿲⿳⿴⿵⿶⿷⿸⿹⿺⿻".split('').forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'idc-btn'; btn.innerText = c;
        btn.onclick = () => { searchInput.value += c; searchInput.focus(); };
        toolbar.appendChild(btn);
    });
</script>
<script async src="//embedr.flickr.com/assets/client-code.js" charset="utf-8"></script>
</body>
